<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        /* Mobile-friendly Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.85);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Ensure the body allows standard zooming and scrolling */
        body { touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 h-screen w-screen overflow-hidden flex flex-col">

    <div id="loader" class="fixed inset-0 z-50 bg-gray-50 dark:bg-gray-900 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-300 border-t-blue-600 mb-4"></div>
        <p class="font-medium text-gray-600 dark:text-gray-400">Opening Book...</p>
    </div>

    <main class="flex-grow w-full h-full overflow-auto pb-24 pt-4 flex justify-center items-start">
        <canvas id="pdf-render" class="shadow-md bg-white"></canvas>
    </main>

    <nav class="glass fixed bottom-0 left-0 w-full px-4 py-3 pb-safe flex justify-between items-center z-40 shadow-2xl">
        <div class="flex items-center gap-2">
            <button id="prev-page" class="p-3 rounded-full bg-black/5 dark:bg-white/10 active:bg-black/10 transition touch-manipulation">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <span class="font-mono text-base font-medium min-w-[4rem] text-center">
                <span id="page-num">0</span> / <span id="page-count">0</span>
            </span>
            <button id="next-page" class="p-3 rounded-full bg-black/5 dark:bg-white/10 active:bg-black/10 transition touch-manipulation">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="flex items-center gap-1 border-l border-gray-300 dark:border-gray-700 pl-2">
            <button id="bookmark-btn" class="p-3 rounded-full active:bg-black/5 dark:active:bg-white/5 transition text-blue-600 dark:text-blue-400 touch-manipulation">
                <svg id="bookmark-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
            </button>
            <button id="theme-toggle" class="p-3 rounded-full active:bg-black/5 dark:active:bg-white/5 transition touch-manipulation">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
